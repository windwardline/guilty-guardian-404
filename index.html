<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: Page Buried</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sky">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
    </div>
    <div class="grass"></div>

    <h1>Error 404</h1>

    <div class="text-container">
        <p id="message">Bodie got to this link before we could. It is currently buried somewhere in the backyard next to a chewed up ethernet cable.</p>
    </div>

    <div class="dog-wrapper">
        <div class="tail"></div>
        <div class="pyrenees-body"></div>
        
        <div class="dirt-mound"></div>
        <div class="hole"></div>
        
        <div class="pyrenees-head">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="eye left"><div class="pupil"></div></div>
            <div class="eye right"><div class="pupil"></div></div>
            <div class="snout">
                <div class="dirt-smudge"></div>
                <div class="nose"></div>
            </div>
        </div>
        
        <div class="dirt-spray">
            <div class="dirt-clod clod-1"></div>
            <div class="dirt-clod clod-2"></div>
            <div class="dirt-clod clod-3"></div>
            <div class="dirt-clod clod-4"></div>
            <div class="dirt-clod clod-5"></div>
        </div>
        
        <div class="paw left"></div>
        <div class="paw right"></div>
    </div>
    
    <div class="interaction-zone">
        <button id="runawayBtn">
            <svg viewBox="0 0 24 24" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)">
                <path d="M21 11H6.83L10.41 7.41L9 6L3 12L9 18L10.41 16.59L6.83 13H21V11Z"/>
            </svg>
            Fetch Home
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
